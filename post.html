d along the beach and asked people to write life advice or their favorite quotes in my notebook (it was fun). We also went to a café with Klara and tried their traditional potatoes with two sauces. And I even managed to sign up for the gym.\n\n We also experienced a calima here — when sand from the Sahara reaches the island, bringing heat and a hazy, almost foggy sky. I can’t say it affected me much though, it actually felt pretty normal.\n\n The first week at work was quite relaxed, but also full of emotions, as we visited various places, often sat on the beach, and watched the surfers. I started learning a bit of Spanish and tried to complete my Codewars tasks as quickly as possible so I could move on to working on a real project.",

ul colonial streets, wooden balconies, and the famous Basilica of Our Lady of the Pine. It’s also a great place to try local chorizo and pastries.\n\n  On Sunday, Klara and I decided to visit the Jardín Botánico Viera y Clavijo, and I was honestly amazed by how many different plants and trees there were. The cacti impressed me the most - there were so many of them, all in different shapes and sizes, it felt like a completely different world.  I also really loved just sitting there and listening to the birds singing. It felt so peaceful, almost like a kind of meditation. The way there was a bit challenging though - we couldn’t find the proper walking path and ended up walking along the road for cars, which wasn’t the easiest experience. But in the end, it was absolutely worth it. On our way back, we got lucky and asked some people who were driving to Las Palmas if we could join them. They kindly gave us a ride back to the city, which made the whole day feel even more special. \n\n At work, I haven’t received any tasks yet, but I’ve already cloned the project and read through the documentation.",
