        content: "We flew out on Thursday. For me, the flight wasn’t the most pleasant this time, as I had a bit of a cold and an earache during the journey. Still, the thought of soon being in Las Palmas kept my spirits high.\n As soon as we arrived and settled into the apartment, we noticed that one room was very spacious while the other was quite tiny. To make sure no one felt left out, we decided to swap rooms after a month.\n\n The next day, we had a meeting with our Erasmus internship coordinator, followed by a presentation about the company. The coordinator explained the apartment rules, gave us information about excursions, and covered other organizational details. After that, we went to the company. There, we met four colleagues. They were kind and friendly, so we had a short introduction and got to know each other a little. Later, Klara and I went to buy a bus travel card.\n\n On Saturday, we visited the carnival in Maspalomas, which is in another city. We really enjoyed it and had a great time.(You can watch photos in  gallery)\n\n The first working day on Monday wasn’t very busy. We were told to solve Codewars tasks, and at the end of the day we had a talk with the boss. He told us a bit about the company and the tasks, and also introduced us to the whole team. The second day was already more interesting. The boss gave us specific Codewars tasks and added us to a clan there to determine our level and then assign tasks accordingly. \n\n I haven’t had time to get to know everyone yet, but the people I’ve met so far are very friendly and always ready to help. For example, today I was working on a task for a long time, and one colleague came to help me. They treated us to ice cream and candy, and I really liked it, was very nice. This week will be shorter, since Thursday and Friday are holidays and we have days off. \n\nOverall, I really like it here. During the first five days, I was constantly going out, sitting by the beach and watching the waves. I walked along the beach and asked people to write life advice or their favorite quotes in my notebook (it was fun). We also went to a café with Klara and tried their traditional potatoes with two sauces. And I even managed to sign up for the gym.\n\n We also experienced a calima here - when sand from the Sahara reaches the island, bringing heat and a hazy, almost foggy sky. I can’t say it affected me much though, it actually felt pretty normal.\n\n The first week at work was quite relaxed, but also full of emotions, as we visited various places, often sat on the beach, and watched the surfers. I started learning a bit of Spanish and tried to complete my Codewars tasks as quickly as possible so I could move on to working on a real project.",

        content: "The second week kicked off with me wrapping up my Codewars tasks pretty quickly on Monday. We were actually told we could spend up to two weeks on them, but I was really eager to start working on a real project, so I pushed myself to finish sooner. I messaged my boss, who is also my mentor, and he told me that this week I’d already be joining an internal company project, which I was really excited about. \n\n In my free time, I try not to stay at home too much and go out for walks. However, I’ve been dealing with a persistent cough and a sore throat for over a week now, so I’ve been trying to stick to places where it’s less windy(which unfortunately means avoiding the ocean for now.)\n\n We also noticed that getting into our apartment isn’t always smooth. It uses a code instead of keys, and sometimes, even when you enter the correct code, the door just won’t open. We informed the Erasmus coordinator, and thankfully, the issue was resolved quite quickly.\n\n On a more positive note, I’ve discovered a new hobby here - I started drawing. I’m definitely still a beginner, but I guess everything takes time 🙂 \n\n Then on Saturday we went to make a tour. Our journey started at the Bandama Caldera, where we enjoyed breathtaking views over the crater.\n Highlight: one of the best-preserved volcanic craters on the island, formed thousands of years ago.\n\n Next, we stopped in Vega de San Mateo, a charming village full of local life. Highlight: famous for its farmers’ market with fresh fruits, vegetables, nuts, and traditional Canarian products.\n We were on our way to Pico de las Nieves (1,959 meters), the highest point of the island, but due to heavy fog, we had to turn back.\n\n We also passed through Cruz de Tejeda.\n  Highlight: from here, we had a stunning view of Roque Nublo - the landscape was absolutely breathtaking and one of the most beautiful moments of the tour\n\nOur tour ended in the picturesque town of Teror. \nHighlight: known for its beautiful colonial streets, wooden balconies, and the famous Basilica of Our Lady of the Pine. It’s also a great place to try local chorizo and pastries.\n\n  On Sunday, Klara and I decided to visit the Jardín Botánico Viera y Clavijo, and I was honestly amazed by how many different plants and trees there were. The cacti impressed me the most - there were so many of them, all in different shapes and sizes, it felt like a completely different world.  I also really loved just sitting there and listening to the birds singing. It felt so peaceful, almost like a kind of meditation. The way there was a bit challenging though - we couldn’t find the proper walking path and ended up walking along the road for cars, which wasn’t the easiest experience. But in the end, it was absolutely worth it. On our way back, we got lucky and asked some people who were driving to Las Palmas if we could join them. They kindly gave us a ride back to the city, which made the whole day feel even more special. \n\n At work, I haven’t received any tasks yet, but I’ve already cloned the project and read through the documentation.",

    3: {
        title: "Stepping Into Real Work",
        content: "This week started off really interesting because I finally received concrete tasks. Since I asked to focus on frontend work, I was assigned to build an admin panel interface. The goal was to create a system where you can assign roles to users, define which servers they are allowed to manage, and set what permissions they have. This felt much more engaging than just writing basic coding exercises, because it’s closer to a real-world product. At the same time, getting back into the code wasn’t easy at first. I haven’t worked with React in a long time, so I needed some time to refresh my memory and understand how everything works again. I also had to ask my colleagues for help along the way. One of the most challenging parts was actually understanding what was expected from me. Not all of my colleagues speak English fluently, and my English isn’t perfect either anymore, since after I started learning German I slowly began to forget some of it. So I really had to put in extra effort to understand the requirements properly.\n\n Not long ago, my colleague, Klara and I decided to treat ourselves to a little escape and headed to Agaete - a quiet town nestled in the province of Las Palmas. And honestly? It stole our hearts almost immediately. (Before setting off, we grabbed bocadillos (tiny sandwiches for around a euro each, where you pick your own fillings). Simple, unpretentious, and somehow absolutely delicious. We left completely full. \n\n The air there is remarkably fresh, the pace of life borders on meditative. But what truly catches your eye are the houses. Many of them are painted in soft, dreamy shades of blue, making the whole town feel almost surreal - like you've wandered into the pages of an illustrated storybook. And as it turns out, this isn't just a happy coincidence - the colour of the facades is actually regulated by the government. Buy a house there and you simply don't get to repaint it on a whim. It sounds restrictive at first, but then it clicks: this is exactly what keeps the town looking so beautifully consistent and unlike anywhere else. There's also a bridge with a story to tell - part romantic, part dramatic. Legend has it that lovers used to jump from it, and locals now call it the Romeo and Juliet bridge. Whether it's myth or history, it adds just the right touch of mystery and emotion to the place.\n\n Then we went to Playa de Amadores  on the southern coast - a sun-soaked day, warm and perfect for swimming. Or so I thought. The water had other plans. For me, it was absolutely freezing. I managed to get in twice, each time for roughly a minute before retreating in defeat.\n\n And then came the ride home - an unexpectedly perfect ending. The driver's card terminal broke down. No cash, card not accepted, no alternative. We arrived home having paid absolutely nothing. Some days just wrap themselves up rather nicely.",

    4: {
        title: "Feel like at home",
        content: "I'm starting to feel at home here - the place, the work, the people. Inside jokes are forming, shared topics are clicking, and there's a whole little culture building between us. Love that.\n\n The assignment I was given is still in progress - I hit a wall with the API, couldn't figure out how to fetch users from the backend and display them. But honestly? I'm lucky with my colleagues. Whenever I get stuck, I just walk up to them and ask, and they help without hesitation. That means a lot. \n\n My morning routine is becoming one of my favourite things. I take one bus to a stop, and then instead of catching a second one, I walk 25 minutes uphill to the office - headphones in, music on. What could've been a commute annoyance is actually my favourite part of the morning. It wakes me up better than coffee.\n\n And the office vibe? They have a shared playlist that everyone contributes to - literally anyone can add songs they want to hear. I'm obsessed with this. Working to music you actually enjoy hits different.\n\n This week also had some variety outside of work. I went to a bachata class with people from the Erasmus community. At first I was a little awkward - everyone seemed to know each other already and it was clearly not their first time, while I knew absolutely no one. But the second the music started and we began moving, the shyness just... melted. Almost nobody was a professional dancer, so we all just vibed and went for it. The best kind of chaos. Only downside: we finished at 11:30pm and I'm usually asleep by 10. My apartment being one minute away was truly a blessing.\n\nAlso - I've fallen in love with a specific pastry from a place somewhere between the old town and Triana, on this cute little shopping street. This week I tried to go there twice. Spend 30 minutes each time to get there. Both times: no pastries. Gone. I was devastated. They're SO good and all I wanted was to eat them but the universe had other plans 😭😭😭 \n\nOh, and I also visited Museo Elder - the science and technology museum right in Parque Santa Catalina. The museum's motto is literally 'Prohibited NOT to touch' - which already tells you everything about the vibe. Its spread across four floors, it covers physics, astronomy, biology, mathematics, engineering and more - and almost everything is interactive. It doesn't feel like a museum where you shuffle past things behind glass. It feels like a giant playground for your brain. The highlight for me was the planetarium - you sit back and suddenly the entire ceiling becomes the night sky. Constellations, planets, the whole universe just... unfolding above you. It's one of those experiences where you leave feeling both tiny and amazed at the same time.Honestly, it's the kind of place you expect to be 'just for kids' and then you spend three hours there as a fully grown adult with no regrets whatsoever.\n\n Also - I went on a boat tour to spot whales and dolphins. Dolphins I've seen before in real life, so I'll be honest, my heart was set on the whales. And we actually saw them - which felt like a small miracle. Now, I'll admit I had a very specific vision in my head: a massive whale dramatically launching itself out of the ocean, full body, cinematic, main character energy. What we actually got was more of a bit of it. A suggestion of whale. But you know what? I'll take it. A glimpse of something that enormous moving through the water still hits differently than any nature documentary. We also spotted a sea turtle, which was genuinely adorable and a little unexpected - just casually doing its thing near the surface like it had nowhere to be. The one plot twist of the trip: by the end, I discovered I am apparently prone to seasickness. Nothing catastrophic happened. But let's just say the boat ride back was a character-building experience and leave it at that 😅 Would not trade it though. 10/10, would risk mild nausea again for another turtle and whales sighting. \n\n I also made it down to the Maspalomas dunes and Playa del Inglés. Honestly, nothing quite prepares you for the dunes. They stretch across over 400 hectares on the southern tip of Gran Canaria and have been a protected nature reserve since 1987 - and standing there, you immediately understand why. Walking through this sea of golden sand feels like being transported to the Sahara, with the ocean just a short distance away. The contrast is almost surreal - desert on one side, Atlantic on the other. πThe sand actually came from the ocean floor during the last ice age, when the water retreated  - and over time the wind shaped it all into the dunes you see today.  So technically you're walking on ancient seabed. Cool detail to think about mid-stroll.",

    5: {
        title: "Park Views, Jet Skis & Bananas",
        content: "Okay, where do I even begin. This week was genuinely one of those weeks where you look back and think - did all of this actually happen in seven days? \n\n Let's start with Parque Doramas. „The park is this lush, almost secretive green oasis tucked right in the heart of Las Palmas - locals even call it the lungs of the city.“ - that’s what locals are saying, but for me it was just a normal park, not like something really special,  but the thing that I really enjoyed  were the jacaranda trees - these gorgeous, dreamlike trees covered in violet-purple blossoms. The jacaranda is a beloved ornamental tree all over the Canary Islands, and its flowers - large, bell-shaped, blue-lilac clusters - adorn parks and streets across the archipelago. They're everywhere in Las Palmas in the blooming season and honestly, they look unreal. Like someone decided the city needed more magic and just planted it. The park also has an elevated area at the top, and when you climb up there, the whole city spreads out in front of you like a painting. We went during the day, and I would like to come back there, when it will be dark.. I think it will be very beautiful. \n\n Then came the day I'd basically been dreaming about: jet skiing. Finally. My dream came true and it was everything - the speed, the waves hitting you in the face, the wind, that feeling of total weightlessness and zero worries. But the best part? On the way out, we spotted a sea turtle just casually gliding through the water alongside us, completely unbothered. 10/10 experience, genuinely worth every cent - I'd recommend it to literally everyone. That same day we also visited a camel farm, and I was not prepared for how sweet camels actually are. Surprisingly gentle creatures.\n\n Next up: paella. Spain's most iconic dish - and yes, I had opinions about the price at first. Then the portion arrived and I instantly forgot I'd ever complained. It was enormous and absolutely delicious. Now, here's the interesting thing - paella originates from Valencia, where it began as a humble dish prepared by farmers using whatever ingredients they had on hand, cooked in large iron pans over an open fire. True Paella Valenciana has protected status and must follow strict rules - only ten traditional ingredients are allowed, including DOP rice, chicken, rabbit, and specific types of beans. So when people say the version outside of Valencia isn't quite the same, they're not wrong - but what we had was still seriously, ridiculously good. No complaints from me. \n\n And finally - the banana plantation. We had a 10:30 booking. We did not make the 10:30 booking. There were... adventures. There was a bus breakdown. But the people there were so genuinely kind that they gave us a  tour later anyway, and honestly it might have worked out better. Here's the mind-blowing thing I learned: a banana plant is technically not a tree at all - it's a large herbaceous plant. What looks like a trunk is actually a pseudostem - a tightly wrapped bundle of leaf sheaths, not wood at all. And it gets better. Each pseudostem fruits only once in its lifetime - after that, it passes its energy on to the next generation of offshoots. The cycle even has names: the mother plant, the daughter, and the grandmother - the one that already fruited and is slowly declining but still nourishing what comes next. I thought that was the most beautiful thing. We also saw blue bananas - yes, they exist, yes I photographed them, and yes, every single one of my friends told me they don't look blue. The debate continues. The plantation itself sits on a hillside with a wide open view of the ocean, and after the tour you can just... sit there. In silence. Looking at the water. It felt like a reward. \n\n What a week. I'm still processing it honestly. If you ever get the chance to do any of these things - the jet ski, the banana tour, camels - just say yes. Every single one of them was worth it.",
