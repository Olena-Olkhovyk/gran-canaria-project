d along the beach and asked people to write life advice or their favorite quotes in my notebook (it was fun). We also went to a café with Klara and tried their traditional potatoes with two sauces. And I even managed to sign up for the gym.\n\n We also experienced a calima here — when sand from the Sahara reaches the island, bringing heat and a hazy, almost foggy sky. I can’t say it affected me much though, it actually felt pretty normal.\n\n The first week at work was quite relaxed, but also full of emotions, as we visited various places, often sat on the beach, and watched the surfers. I started learning a bit of Spanish and tried to complete my Codewars tasks as quickly as possible so I could move on to working on a real project.",
